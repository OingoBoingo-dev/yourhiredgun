<body class="projectsbg spotlight-page">

        <div class="mask-wrap m2">
            <div class="bg-layer bg-gray m3"></div>

    </div>

    <div class="bg-vignette" aria-hidden="true"></div>

<div class="page">

    <nav class="site-nav">

</div>

<!-- shared lightbox (videos/music play inline straight from the feed) -->
<div class="lightbox" id="lightbox"></div>

<script src="js/main.js?v=202606151920"></script>
<script>
YHG.applyTheme('feed');
YHG.renderFeed(document.getElementById('feed'), {
  titleEl: document.getElementById('feedTitle'),
  introEl: document.getElementById('feedIntro')
});
YHG.spotlight(document.getElementById('maskRoot'));
</script>
